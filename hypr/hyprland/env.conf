# ╔══════════════════════════════════════════════════════════════╗
# ║  ENVIRONMENT VARIABLES                                      ║
# ║                                                              ║
# ║  These tell applications how to behave under Hyprland.       ║
# ║  Most of this is "make Wayland work properly" boilerplate.   ║
# ╚══════════════════════════════════════════════════════════════╝

# --- Session Identity ---
# Tells apps "you're running on Hyprland under Wayland"
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XDG_SESSION_DESKTOP, Hyprland

# --- Toolkit Backends ---
# Force Qt and GTK apps to use Wayland first, fall back to X11
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland;xcb
env = QT_QPA_PLATFORMTHEME, qt5ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION, 1
env = QT_AUTO_SCREEN_SCALE_FACTOR, 1

# --- Cursor ---
# Your cursor theme and size. Change these to match whatever you install.
env = XCURSOR_THEME, Adwaita
env = XCURSOR_SIZE, 24

# --- Java fix ---
# Some Java apps (like Android Studio) break under tiling WMs without this
env = _JAVA_AWT_WM_NONREPARENTING, 1

# --- Electron/Chromium ---
# Makes Electron apps (VS Code, Obsidian, Discord) run natively on Wayland
env = ELECTRON_OZONE_PLATFORM_HINT, auto
