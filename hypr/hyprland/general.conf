# ╔══════════════════════════════════════════════════════════════╗
# ║  GENERAL SETTINGS                                           ║
# ║                                                              ║
# ║  Layout, gaps, borders. The skeleton of your tiling setup.   ║
# ╚══════════════════════════════════════════════════════════════╝

general {
    # --- Layout ---
    # "dwindle" splits windows in a binary tree pattern (like bspwm).
    # The alternative is "master" where one window is big and the rest stack.
    layout = dwindle

    # --- Gaps ---
    # gaps_in:  space between adjacent windows
    # gaps_out: space between windows and screen edges
    # macOS does not tile, but its window spacing reads as tight rather
    # than airy. We pull both gaps in slightly. Outer gap also accounts
    # for the menubar (28px) so windows do not crowd it.
    gaps_in = 4
    gaps_out = 8

    # --- Borders ---
    # Thinner border for a quieter macOS feel. The shadow does the heavy
    # lifting on visual hierarchy.
    border_size = 1
    col.active_border = $border_active
    col.inactive_border = $border_inactive

    # --- Behavior ---
    # Don't allow screen tearing (visual glitches where top/bottom of screen
    # show different frames). Gaming rices enable this; we don't need it.
    allow_tearing = false
}

# --- Dwindle Layout Options ---
dwindle {
    # preserve_split: remembers which direction a container was split.
    # Without this, resizing can randomly flip your layout.
    preserve_split = true

    # smart_split: auto-decide split direction based on window shape.
    # Disabled because it can be surprising. Better to learn the manual controls.
    smart_split = false

    # smart_resizing: when resizing, affects the correct neighbor.
    smart_resizing = true
}
