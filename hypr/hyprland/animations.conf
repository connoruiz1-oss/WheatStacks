# ╔══════════════════════════════════════════════════════════════╗
# ║  ANIMATIONS                                                 ║
# ║                                                              ║
# ║  Philosophy: speed first. Animations exist only to provide   ║
# ║  enough visual continuity that the eye can track what moved. ║
# ║  Anything longer than ~120ms starts to feel like the         ║
# ║  computer is making you wait. We stay well under that.       ║
# ║                                                              ║
# ║  No spring. No overshoot. No theatrics. Just a quick         ║
# ║  ease-out so frames do not snap into existence.              ║
# ║                                                              ║
# ║  If you want zero-latency feel, set `enabled = false` below. ║
# ╚══════════════════════════════════════════════════════════════╝

animations {
    enabled = true

    # --- One curve, used everywhere ---
    # A single sharp ease-out. Front-loaded acceleration, no tail.
    # The motion is over before you notice it started.
    bezier = quick, 0.2, 1.0, 0.2, 1.0

    # --- Animation Assignments ---
    # Speed is in 100ms units. We use 1 (100ms) almost everywhere; that is
    # right at the threshold of conscious perception. workspaces gets 2
    # only because the entire screen is moving and we still need a
    # moment of continuity, otherwise the eye loses track.

    # Window appears / disappears
    animation = windowsIn,  1, 1, quick, popin 95%
    animation = windowsOut, 1, 1, quick, popin 95%
    animation = windowsMove, 1, 1, quick

    # Opacity transitions (focus, hover, etc.)
    animation = fade, 1, 1, quick

    # Border color transitions on focus change
    animation = border, 1, 1, quick

    # The rotating gradient on borders (purely cosmetic, slow on purpose
    # so it reads as ambient rather than as an animation).
    # Disabled because it constantly redraws and adds GPU load for no
    # interaction value. Re-enable if you ever want it.
    animation = borderangle, 0

    # Workspace switching. Slightly longer (200ms) for visual continuity
    # since the whole screen moves. Drop to 1 if you want it instant.
    animation = workspaces, 1, 2, quick, slide

    # Special workspaces (browser/notes/scratchpad drawers).
    animation = specialWorkspace, 1, 2, quick, slidevert
}

# ╔══════════════════════════════════════════════════════════════╗
# ║  Tuning knobs if you want to go even faster                  ║
# ║                                                              ║
# ║  1. Set `enabled = false` to kill all animations.            ║
# ║  2. Change every `1` in the speed column to `0` for instant. ║
# ║  3. Disable just the one that bugs you (e.g. windowsOut).    ║
# ║                                                              ║
# ║  Rule of thumb: lower the speed of whatever motion you       ║
# ║  notice. If you do not notice it, leave it alone.            ║
# ╚══════════════════════════════════════════════════════════════╝
