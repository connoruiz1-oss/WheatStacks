# ╔══════════════════════════════════════════════════════════════╗
# ║  DECORATION                                                 ║
# ║                                                              ║
# ║  Visual polish: rounding, blur, shadows, opacity.            ║
# ║  This is where the rice gets its personality.                ║
# ╚══════════════════════════════════════════════════════════════╝

decoration {
    # --- Corner Rounding ---
    # macOS windows use ~10px on Retina, which scales to about 8 on a 1080p
    # display. Tuned for a familiar Apple-window silhouette.
    rounding = 8

    # --- Opacity ---
    # macOS windows are essentially opaque. We keep a hint of translucency
    # on inactive windows so the wallpaper subtly shows through, mimicking
    # the macOS "stage" depth cue.
    active_opacity = 0.90
    inactive_opacity = 0.70

    # --- Blur ---
    # Frosted glass behind the menubar and rofi (configured in rules.conf
    # via layerrule). Slightly stronger than default to read as macOS-style
    # vibrancy rather than mere transparency.
    blur {
        enabled = true
        size = 8
        passes = 3
        ignore_opacity = true
        new_optimizations = true
        xray = false
        # vibrancy adds warmth to the blur, closer to the macOS "vibrant" look
        vibrancy = 0.18
        vibrancy_darkness = 0.05
    }

    # --- Shadows ---
    # macOS shadows are wide, soft, and fairly low-contrast. We pull
    # render_power down (softer falloff) and increase range so the shadow
    # spreads further from the window edge.
    shadow {
        enabled = true
        range = 28
        render_power = 2
        color = $shadow_color
        # offset: slight downward bias, like macOS's subtle gravity
        offset = 0 6
    }
}
