# ╔══════════════════════════════════════════════════════════════╗
# ║  KEYBINDS                                                    ║
# ║                                                              ║
# ║  Your keyboard shortcuts. $mod is the Super/Windows key.     ║
# ║                                                              ║
# ║  Format:  bind = MODIFIERS, KEY, DISPATCHER, ARGS            ║
# ║  "bind"  = triggers on key press                             ║
# ║  "binde" = triggers repeatedly while held (for resize/vol)   ║
# ║  "bindl" = works even when screen is locked                  ║
# ║                                                              ║
# ║  Mnemonic guide:                                             ║
# ║    T = Terminal  |  B = Browser   |  E = Explorer (files)    ║
# ║    Q = Quit      |  F = Fullscreen|  D = launcher (Dmenu)    ║
# ║    O = Obsidian  |  M = Monitor   |  S = Screenshot          ║
# ╚══════════════════════════════════════════════════════════════╝

$mod = SUPER

# ──────────────────────────────────────────────
# APPLICATIONS
# ──────────────────────────────────────────────

# Core apps
bind = $mod, T, exec, kitty
bind = $mod, B, exec, firefox
bind = $mod, E, exec, thunar
bind = $mod, N, exec, obsidian

# ──────────────────────────────────────────────
# LAUNCHER (Spotlight-equivalent + targeted modes)
# ──────────────────────────────────────────────
# Super+Space      = unified search (apps + windows + ssh) -- mirrors
#                    Cmd+Space on macOS so muscle memory transfers.
# Super+D          = apps only (drun) -- the original keybind, preserved.
# Super+Shift+Space= file finder -- fd-backed, blows past Spotlight's
#                    file search. See rofi/scripts/filefinder.sh.
# Inside any rofi, Ctrl+Tab cycles modes (set in rofi/config.rasi).

bind = $mod, Space, exec, rofi -show combi -theme ~/.config/rofi/config.rasi
bind = $mod, D, exec, rofi -show drun -theme ~/.config/rofi/config.rasi
bind = $mod SHIFT, Space, exec, ~/.config/rofi/scripts/filefinder.sh

# Obsidian (launches into special workspace, see rules.conf)
bind = $mod, O, exec, obsidian

# ──────────────────────────────────────────────
# WINDOW MANAGEMENT
# ──────────────────────────────────────────────

# Close the focused window
bind = $mod, Q, killactive

# Toggle floating (window pops out of the tiling layout)
bind = $mod ALT, V, togglefloating

# Toggle fullscreen
bind = $mod, F, fullscreen, 0
# "Fake" fullscreen (fills the tile, not the whole screen)
bind = $mod SHIFT, F, fullscreen, 1

# Pin a floating window so it stays visible across all workspaces
bind = $mod, P, pin

# Center a floating window
bind = $mod ALT, C, centerwindow

# ──────────────────────────────────────────────
# FOCUS (move your attention between windows)
# ──────────────────────────────────────────────
# Arrow keys AND vim keys (hjkl) both work.

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# ──────────────────────────────────────────────
# MOVE WINDOWS (rearrange them in the layout)
# ──────────────────────────────────────────────

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Drag/resize with mouse
bindm = $mod, mouse:272, movewindow     # Super + left click drag
bindm = $mod, mouse:273, resizewindow   # Super + right click drag

# ──────────────────────────────────────────────
# RESIZE WINDOWS
# ──────────────────────────────────────────────
# "binde" means the action repeats while the key is held.

binde = $mod CTRL, right, resizeactive, 30 0
binde = $mod CTRL, left, resizeactive, -30 0
binde = $mod CTRL, up, resizeactive, 0 -30
binde = $mod CTRL, down, resizeactive, 0 30

binde = $mod CTRL, L, resizeactive, 30 0
binde = $mod CTRL, H, resizeactive, -30 0
binde = $mod CTRL, K, resizeactive, 0 -30
binde = $mod CTRL, J, resizeactive, 0 30

# ──────────────────────────────────────────────
# WORKSPACES (1-9, your main desks)
# ──────────────────────────────────────────────
# Super + number = go to workspace
# Super + Shift + number = move focused window to workspace

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9

bind = $mod ALT, 1, movetoworkspace, 1
bind = $mod ALT, 2, movetoworkspace, 2
bind = $mod ALT, 3, movetoworkspace, 3
bind = $mod ALT, 4, movetoworkspace, 4
bind = $mod ALT, 5, movetoworkspace, 5
bind = $mod ALT, 6, movetoworkspace, 6
bind = $mod ALT, 7, movetoworkspace, 7
bind = $mod ALT, 8, movetoworkspace, 8
bind = $mod ALT, 9, movetoworkspace, 9

# Scroll through workspaces with Super + mouse wheel
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# ──────────────────────────────────────────────
# SPECIAL WORKSPACES (hidden toggle drawers)
# ──────────────────────────────────────────────
# These are invisible workspaces that slide in/out with a keybind.
# Window rules in rules.conf automatically send the right apps here.
#
# Think of them like a scratchpad: the app stays running in the
# background; the keybind just shows/hides the overlay.

# Browser (your most-used tool gets the prime real estate)
bind = $mod, W, togglespecialworkspace, browser

# System monitor (btop or similar)
bind = CTRL SHIFT, Escape, togglespecialworkspace, sysmon

# Obsidian (quick notes without switching context)
bind = $mod, N, togglespecialworkspace, notes

# General scratchpad (terminal, calculator, whatever you throw in)
bind = $mod, grave, togglespecialworkspace, scratch

# ──────────────────────────────────────────────
# SCREENSHOTS
# ──────────────────────────────────────────────
# Requires: grim, slurp, wl-copy (from wl-clipboard)

# Full screen to clipboard
bind = , Print, exec, grim - | wl-copy
# Region select to clipboard
bind = $mod SHIFT, 4, exec, grim -g "$(slurp)" - | wl-copy
# Region select → annotate in swappy → save
bind = $mod SHIFT, A, exec, grim -g "$(slurp)" - | swappy -f -
# Region select to file
bind = $mod SHIFT ALT, V, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# ──────────────────────────────────────────────
# COPY / PASTE
# ──────────────────────────────────────────────
# Requires: wtype (AUR), cliphist, wl-clipboard
#
# Super+C sends Ctrl+C to the focused window (copy selection).
# Super+V pastes the most recent clipboard item directly.
# Super+Shift+V opens the full clipboard history picker via rofi.

bind = $mod, C, exec, wtype -M ctrl c
bind = $mod, V, exec, cliphist list | head -1 | cliphist decode | wl-copy && sleep 0.05 && wtype -M ctrl v
bind = $mod SHIFT, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy && sleep 0.05 && wtype -M ctrl v

# ──────────────────────────────────────────────
# MEDIA & HARDWARE KEYS
# ──────────────────────────────────────────────
# These work even on the lock screen (bindl) and repeat when held (binde).

# Volume
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindl  = , XF86AudioMute, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ toggle

# Media playback
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous

# Brightness (if your mini PC has a display with adjustable brightness)
bindel = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ──────────────────────────────────────────────
# SYSTEM
# ──────────────────────────────────────────────

# Lock screen
bind = $mod, Delete, exec, hyprlock

# Exit Hyprland (careful! closes everything)
bind = $mod SHIFT, Delete, exit

# Reload config (Hyprland does this on file save, but just in case)
bind = $mod SHIFT, R, exec, hyprctl reload
