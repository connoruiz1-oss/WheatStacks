# ╔══════════════════════════════════════════════════════════════╗
# ║  AUTOSTART / EXEC                                           ║
# ║                                                              ║
# ║  Programs that launch when Hyprland starts.                  ║
# ║  "exec-once" runs only on first load (not on config reload). ║
# ║  "exec" runs every time the config is sourced.               ║
# ╚══════════════════════════════════════════════════════════════╝

# --- Authentication ---
# PolicyKit agent: handles "this action needs your password" popups
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1

# --- Clipboard ---
# Pipe clipboard contents into cliphist for history.
# This runs in the background and captures everything you copy.
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# --- Status Bar ---
exec-once = waybar

# --- Wallpaper ---
# hyprpaper is the native Hyprland wallpaper daemon. It reads its
# configuration from ~/.config/hypr/hyprpaper.conf, which already
# specifies which image(s) to preload and assign to which monitor.
#
# To change wallpaper at runtime (without restarting the daemon):
#   hyprctl hyprpaper preload   "<path-to-new.jpg>"
#   hyprctl hyprpaper wallpaper ", <path-to-new.jpg>"
exec-once = awww-daemon
exec-once = aww img /home/connor/Pictures/Wallpapers/wallpaper.png

# --- Desktop Widgets ---
# EWW (ElKowars Wacky Widgets) for desktop overlays
exec-once = eww daemon
exec-once = eww open-many daybox monthbox yearbox userinfobox

# --- Notifications ---
# Pick ONE of these. dunst is simpler; swaync has a notification center.
# Uncomment whichever you prefer.
exec-once = dunst
# exec-once = swaync

# --- Cursor ---
exec-once = hyprctl setcursor Adwaita 24

# --- Night Light ---
# gammastep shifts your screen warm at night to reduce eye strain.
# Uncomment and set your latitude/longitude.
# exec-once = gammastep -l 34.0:-118.0

# --- Special Workspace Apps ---
# Launch apps that should live in special workspaces.
# The window rules in rules.conf will catch them and send them
# to the right special workspace automatically.
#
# Uncomment the ones you want running on boot:
# exec-once = firefox
# exec-once = obsidian
# exec-once = kitty --class btop -e btop

# --- Scratchpad Terminal ---
# A terminal that lives in the scratch special workspace.
# Uses kitty's --class flag so the window rule can catch it.
# exec-once = kitty --class scratch-term
