# ╔══════════════════════════════════════════════════════════════╗
# ║  WINDOW RULES                                               ║
# ║                                                              ║
# ║  Rules that automatically apply to windows based on their    ║
# ║  class, title, or other properties.                          ║
# ║                                                              ║
# ║  V1 syntax:  windowrule = RULE, ^(class-regex)$             ║
# ║              windowrule = RULE, title:^(title-regex)$        ║
# ║  V2 syntax:  windowrulev2 = RULE, class:^(...)$, title:^(...)$
# ║                                                              ║
# ║  Use V1 for single-selector rules (class or title only).     ║
# ║  Use V2 only when you need to match class AND title together. ║
# ║                                                              ║
# ║  To find a window's class/title, run:                        ║
# ║    hyprctl clients                                           ║
# ║  while the window is open.                                   ║
# ╚══════════════════════════════════════════════════════════════╝

# ──────────────────────────────────────────────
# OPACITY OVERRIDES
# ──────────────────────────────────────────────
# Some apps look bad with transparency (video players, image editors).
# Force them to be fully opaque.
# "override" sets an exact value rather than a multiplier.

windowrule = opacity 1.0 override 1.0 override, ^(mpv)$
windowrule = opacity 1.0 override 1.0 override, ^(imv)$
windowrule = opacity 1.0 override 1.0 override, ^(gimp)$
windowrule = opacity 1.0 override 1.0 override, ^(blender)$
windowrule = opacity 1.0 override 1.0 override, ^(inkscape)$

# ──────────────────────────────────────────────
# FLOATING WINDOWS
# ──────────────────────────────────────────────
# Dialogs, settings panels, and small utilities should float
# rather than getting crammed into a tile.

windowrule = float, ^(pavucontrol)$
windowrule = float, ^(nm-connection-editor)$
windowrule = float, ^(blueman-manager)$
windowrule = float, ^(nwg-look)$
windowrule = float, ^(file-roller)$
windowrule = float, title:^(File Operation)$
windowrule = float, title:^(Confirm)$
windowrule = float, title:^(Properties)$

# File picker dialogs (the "Open File" / "Save As" popups)
windowrule = float, title:^(Open File)$
windowrule = float, title:^(Save As)$
windowrule = float, title:^(Choose Files)$

# Picture-in-picture (e.g. browser video popout)
windowrule = float, title:^(Picture-in-Picture)$
windowrule = pin, title:^(Picture-in-Picture)$
windowrule = size 30% 30%, title:^(Picture-in-Picture)$
windowrule = move 68% 2%, title:^(Picture-in-Picture)$

# ──────────────────────────────────────────────
# SPECIAL WORKSPACE ASSIGNMENTS
# ──────────────────────────────────────────────
# These rules automatically send specific apps to their special
# workspace when they open. The app lives there permanently;
# you toggle its visibility with the keybind from keybinds.conf.
#
# To add your own: find the window class with `hyprctl clients`,
# then add a rule here and a toggle keybind in keybinds.conf.

# --- Browser (Super+W) ---
# Uncomment whichever browser you use:
windowrule = workspace special:browser silent, ^(firefox)$
# windowrule = workspace special:browser silent, ^(zen-browser)$
# windowrule = workspace special:browser silent, ^(chromium)$
# windowrule = workspace special:browser silent, ^(brave-browser)$

# --- System Monitor (Ctrl+Shift+Escape) ---
windowrule = workspace special:sysmon silent, ^(btop)$
windowrule = workspace special:sysmon silent, title:^(btop)$

# --- Notes / Obsidian (Super+N) ---
windowrule = workspace special:notes silent, ^(obsidian)$

# --- Scratchpad Terminal (Super+`) ---
# Any kitty window with the class "scratch-term" goes here automatically.
# Launch one with: kitty --class scratch-term
windowrule = workspace special:scratch silent, ^(scratch-term)$

# ──────────────────────────────────────────────
# XWAYLAND FIXES
# ──────────────────────────────────────────────
# X11 apps running under XWayland can have quirky popups.
# These rules use V2 because they must match class AND title together.

windowrulev2 = noanim, class:^()$, title:^()$
windowrulev2 = noshadow, class:^()$, title:^()$

# ──────────────────────────────────────────────
# LAYER RULES
# ──────────────────────────────────────────────
# Layer rules apply to UI overlays (rofi, notifications, waybar).

# Rofi launcher gets blur (Spotlight-style frosted glass)
layerrule = blur, rofi
layerrule = ignorezero, rofi

# Waybar gets blur so the menubar reads as macOS vibrancy
layerrule = blur, waybar
layerrule = ignorezero, waybar

# Notification toasts (dunst) get blur and a soft drop shadow,
# matching the macOS notification style.
layerrule = blur, notifications
layerrule = ignorezero, notifications
