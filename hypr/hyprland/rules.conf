# ╔══════════════════════════════════════════════════════════════╗
# ║  WINDOW RULES                                                ║
# ║                                                              ║
# ║  Rules that automatically apply to windows based on their    ║
# ║  class, title, or other properties.                          ║
# ║                                                              ║
# ║  Syntax (Hyprland 0.46+):                                    ║
# ║    windowrule = RULE, class:^(regex)$                        ║
# ║    windowrule = RULE, title:^(regex)$                        ║
# ║    windowrule = RULE, class:^(regex)$, title:^(regex)$       ║
# ║                                                              ║
# ║  windowrulev2 is deprecated — use windowrule for everything. ║
# ║                                                              ║
# ║  To find a window's class/title, run:                        ║
# ║    hyprctl clients                                           ║
# ║  while the window is open.                                   ║
# ╚══════════════════════════════════════════════════════════════╝

# ──────────────────────────────────────────────
# OPACITY OVERRIDES
# ──────────────────────────────────────────────
# Some apps look bad with transparency (video players, image editors).
# Force them to be fully opaque.
# "override" sets an exact value rather than a multiplier.

windowrule = opacity 1.0 override 1.0 override, match:class ^(mpv)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(imv)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(gimp)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(blender)$
windowrule = opacity 1.0 override 1.0 override, match:class ^(inkscape)$

# ──────────────────────────────────────────────
# FLOATING WINDOWS
# ──────────────────────────────────────────────
# Dialogs, settings panels, and small utilities should float
# rather than getting crammed into a tile.

windowrule = float 1, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(blueman-manager)$
windowrule = float 1, match:class ^(nwg-look)$
windowrule = float 1, match:class ^(file-roller)$
windowrule = float 1, match:title ^(File Operation)$
windowrule = float 1, match:title ^(Confirm)$
windowrule = float 1, match:title ^(Properties)$

# File picker dialogs (the "Open File" / "Save As" popups)
windowrule = float 1, match:title ^(Open File)$
windowrule = float 1, match:title ^(Save As)$
windowrule = float 1, match:title ^(Choose Files)$

# Picture-in-picture (e.g. browser video popout)
windowrule = float 1, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = size 30% 30%, match:title ^(Picture-in-Picture)$
windowrule = move 68% 2%, match:title ^(Picture-in-Picture)$

# ──────────────────────────────────────────────
# SPECIAL WORKSPACE ASSIGNMENTS
# ──────────────────────────────────────────────
# These rules automatically send specific apps to their special
# workspace when they open. The app lives there permanently;
# you toggle its visibility with the keybind from keybinds.conf.
#
# To add your own: find the window class with `hyprctl clients`,
# then add a rule here and a toggle keybind in keybinds.conf.

# --- Browser (Super+W) ---
# Uncomment whichever browser you use:
# windowrule = workspace special:browser silent, match:class ^(firefox)$
# windowrule = workspace special:browser silent, class:^(zen-browser)$
# windowrule = workspace special:browser silent, class:^(chromium)$
# windowrule = workspace special:browser silent, class:^(brave-browser)$

# --- System Monitor (Ctrl+Shift+Escape) ---
windowrule = workspace special:sysmon silent, match:class ^(btop)$
windowrule = workspace special:sysmon silent, match:title ^(btop)$

# --- Notes / Obsidian (Super+O) ---
# windowrule = workspace special:notes silent, match:class ^(obsidian)$

# --- Scratchpad Terminal (Super+`) ---
# Any kitty window with the class "scratch-term" goes here automatically.
# Launch one with: kitty --class scratch-term
windowrule = workspace special:scratch silent, match:class ^(scratch-term)$

# ──────────────────────────────────────────────
# XWAYLAND FIXES
# ──────────────────────────────────────────────
# X11 apps running under XWayland can have quirky popups.
# Match empty class AND empty title together to catch unmanaged popups.

# windowrule = noanim, match:class ^()$, match:title ^()$
# windowrule = noshadow, match:class ^()$, match:title ^()$

# ──────────────────────────────────────────────
# LAYER RULES
# ──────────────────────────────────────────────
# Layer rules apply to UI overlays (rofi, notifications, waybar).

# Rofi launcher gets blur (Spotlight-style frosted glass)
layerrule = blur on, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace rofi

# Waybar gets blur so the menubar reads as macOS vibrancy
layerrule = blur on, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace waybar

# Notification toasts (dunst) get blur and a soft drop shadow,
# matching the macOS notification style.
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace notifications
