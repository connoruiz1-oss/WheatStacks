# ╔══════════════════════════════════════════════════════════════╗
# ║  WINDOW RULES                                               ║
# ║                                                              ║
# ║  Rules that automatically apply to windows based on their    ║
# ║  class, title, or other properties.                          ║
# ║                                                              ║
# ║  To find a window's class/title, run:                        ║
# ║    hyprctl clients                                           ║
# ║  while the window is open.                                   ║
# ╚══════════════════════════════════════════════════════════════╝

# ──────────────────────────────────────────────
# OPACITY OVERRIDES
# ──────────────────────────────────────────────
# Some apps look bad with transparency (video players, image editors).
# Force them to be fully opaque.

windowrulev2 = opacity 1.0 override 1.0 override, class:^(mpv)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(imv)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(gimp)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(blender)$
windowrulev2 = opacity 1.0 override 1.0 override, class:^(inkscape)$

# ──────────────────────────────────────────────
# FLOATING WINDOWS
# ──────────────────────────────────────────────
# Dialogs, settings panels, and small utilities should float
# rather than getting crammed into a tile.

windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = float, class:^(nwg-look)$
windowrulev2 = float, class:^(file-roller)$
windowrulev2 = float, title:^(File Operation)$
windowrulev2 = float, title:^(Confirm)$
windowrulev2 = float, title:^(Properties)$

# File picker dialogs (the "Open File" / "Save As" popups)
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save As)$
windowrulev2 = float, title:^(Choose Files)$

# Picture-in-picture (e.g. browser video popout)
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = pin, title:^(Picture-in-Picture)$
windowrulev2 = size 30% 30%, title:^(Picture-in-Picture)$
windowrulev2 = move 68% 2%, title:^(Picture-in-Picture)$

# ──────────────────────────────────────────────
# SPECIAL WORKSPACE ASSIGNMENTS
# ──────────────────────────────────────────────
# These rules automatically send specific apps to their special
# workspace when they open. The app lives there permanently;
# you toggle its visibility with the keybind from keybinds.conf.
#
# To add your own: find the window class with `hyprctl clients`,
# then add a rule here and a toggle keybind in keybinds.conf.

# --- Browser (Super+W) ---
# Uncomment whichever browser you use:
windowrulev2 = workspace special:browser silent, class:^(firefox)$
# windowrulev2 = workspace special:browser silent, class:^(zen-browser)$
# windowrulev2 = workspace special:browser silent, class:^(chromium)$
# windowrulev2 = workspace special:browser silent, class:^(brave-browser)$

# --- System Monitor (Ctrl+Shift+Escape) ---
windowrulev2 = workspace special:sysmon silent, class:^(btop)$
windowrulev2 = workspace special:sysmon silent, title:^(btop)$

# --- Notes / Obsidian (Super+N) ---
windowrulev2 = workspace special:notes silent, class:^(obsidian)$

# --- Scratchpad Terminal (Super+`) ---
# Any kitty window with the class "scratch-term" goes here automatically.
# Launch one with: kitty --class scratch-term
windowrulev2 = workspace special:scratch silent, class:^(scratch-term)$

# ──────────────────────────────────────────────
# XWAYLAND FIXES
# ──────────────────────────────────────────────
# X11 apps running under XWayland can have quirky popups.
# These rules prevent visual glitches.

windowrulev2 = noanim, class:^()$, title:^()$
windowrulev2 = noshadow, class:^()$, title:^()$

# ──────────────────────────────────────────────
# LAYER RULES
# ──────────────────────────────────────────────
# Layer rules apply to UI overlays (rofi, notifications, waybar).

# Rofi launcher gets blur (Spotlight-style frosted glass)
layerrule = blur, rofi
layerrule = ignorezero, rofi

# Waybar gets blur so the menubar reads as macOS vibrancy
layerrule = blur, waybar
layerrule = ignorezero, waybar

# Notification toasts (dunst) get blur and a soft drop shadow,
# matching the macOS notification style.
layerrule = blur, notifications
layerrule = ignorezero, notifications
