# ╔══════════════════════════════════════════════════════════════╗
# ║  INPUT SETTINGS                                             ║
# ║                                                              ║
# ║  Keyboard, mouse, touchpad behavior.                         ║
# ╚══════════════════════════════════════════════════════════════╝

input {
    # --- Keyboard ---
    kb_layout = us
    # Uncomment for other layouts:
    # kb_layout = us,es
    # kb_options = grp:alt_shift_toggle

    # How long to hold a key before it starts repeating (ms)
    repeat_delay = 250
    # How fast it repeats once it starts (characters per second)
    repeat_rate = 35

    # --- Mouse ---
    # Focus follows mouse (you don't need to click a window to type in it)
    follow_mouse = 1
    # When a window closes, focus the window nearest to the cursor
    focus_on_close = 1

    # --- Touchpad ---
    # If your mini PC has no touchpad, this section is harmless.
    touchpad {
        natural_scroll = true
        disable_while_typing = true
        scroll_factor = 0.3
    }
}

