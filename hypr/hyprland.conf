# ╔══════════════════════════════════════════════════════════════╗
# ║  HYPRLAND MAIN CONFIG                                       ║
# ║                                                              ║
# ║  This is the entry point. It sources sub-configs in order.   ║
# ║  Each sub-config handles one concern. Edit them individually ║
# ║  and Hyprland will reload automatically on save.             ║
# ╚══════════════════════════════════════════════════════════════╝

# Load the color palette first (everything else references these variables)
source = ~/.config/hypr/colors.conf

# Load config modules in order
source = ~/.config/hypr/hyprland/env.conf
source = ~/.config/hypr/hyprland/general.conf
source = ~/.config/hypr/hyprland/input.conf
source = ~/.config/hypr/hyprland/decoration.conf
source = ~/.config/hypr/hyprland/animations.conf
source = ~/.config/hypr/hyprland/keybinds.conf
source = ~/.config/hypr/hyprland/rules.conf
source = ~/.config/hypr/hyprland/exec.conf

# --- Monitors ---
# "preferred" means use the monitor's native resolution and refresh rate.
# Change this to match your setup, e.g.:
#   monitor = HDMI-A-1, 1920x1080@60, 0x0, 1
#   monitor = DP-1, 2560x1440@144, 1920x0, 1
monitor = , preferred, auto, 1

# --- User overrides ---
# Create this file to add your own tweaks without editing the main configs.
# It loads last, so your settings win.
source = ~/.config/hypr/user.conf
