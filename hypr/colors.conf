# ╔══════════════════════════════════════════════════════════════╗
# ║  WHEATSTACKS COLOR SCHEME                                   ║
# ║  Inspired by Monet's "Stacks of Wheat (End of Summer)"      ║
# ║                                                              ║
# ║  All colors defined here as variables. Every other config    ║
# ║  references these variables, so to change your palette you   ║
# ║  only need to edit this one file.                            ║
# ╚══════════════════════════════════════════════════════════════╝

# --- Backgrounds ---
# Darkened from the deep purple-black shadows at the base of the stacks
$bg_dark       = rgb(1a1520)
$bg_surface    = rgb(252030)
$bg_overlay    = rgb(302a3a)

# --- Foregrounds ---
# The warm cream of the horizon sky, stepping down through the muted field tones
$fg_primary    = rgb(d4c4b0)
$fg_secondary  = rgb(a09890)
$fg_dim        = rgb(706868)

# --- Accents ---
# Each pulled from a distinct region of the painting
$accent_warm     = rgb(b07050)   # Russet from the wheat stack bodies
$accent_gold     = rgb(c4a060)   # Warm gold from the sunlit field
$accent_rose     = rgb(c08888)   # Dusty rose from the pink evening light
$accent_lavender = rgb(9088a0)   # Lavender from the shadowed ground
$accent_sage     = rgb(708070)   # Muted sage from the distant hills
$accent_sky      = rgb(a0a8b0)   # Pale blue-grey from the upper sky

# --- Semantic ---
$color_error   = rgb(c06060)
$color_warning = rgb(c4a060)
$color_success = rgb(80a078)
$color_info    = rgb(8090a8)

# --- Borders ---
# Active border uses the russet accent; inactive fades to the overlay tone
$border_active   = rgb(b07050)
$border_inactive = rgb(302a3a)

# --- Hyprland-specific rgba values (for shadows, etc.) ---
$shadow_color = rgba(1a152080)
