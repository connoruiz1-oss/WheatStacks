# ╔══════════════════════════════════════════════════════════════╗
# ║  USER OVERRIDES                                             ║
# ║                                                              ║
# ║  This file loads LAST, so anything here overrides the        ║
# ║  defaults. Use it for personal tweaks without modifying      ║
# ║  the main configs.                                           ║
# ║                                                              ║
# ║  Examples:                                                   ║
# ║    monitor = HDMI-A-1, 1920x1080@60, 0x0, 1                 ║
# ║    bind = $mod, Z, exec, my-custom-script.sh                 ║
# ║    general { gaps_out = 20 }                                 ║
# ╚══════════════════════════════════════════════════════════════╝

# Your overrides go here:
bind = $mod, I, layoutmsg, preselect r   # force next split to the RIGHT
bind = $mod, U, layoutmsg, preselect d   # force next split DOWNWARD
