# ╔══════════════════════════════════════════════════════════════╗
# ║  HYPRPAPER -- the wallpaper daemon                           ║
# ║                                                              ║
# ║  Native Hyprland wallpaper handler. Lighter than swww and    ║
# ║  maintained by the same team as the compositor itself.       ║
# ║                                                              ║
# ║  Two-step model:                                             ║
# ║    1. preload   -- decode the image into memory              ║
# ║    2. wallpaper -- assign a (preloaded) image to a monitor   ║
# ║                                                              ║
# ║  You can preload several images and switch between them at   ║
# ║  runtime via `hyprctl hyprpaper wallpaper "<monitor>,<path>"`,
# ║  which is the basis for the rotation hook below.             ║
# ║                                                              ║
# ║  Reload:  killall hyprpaper && hyprpaper &                   ║
# ║  Docs:    https://wiki.hyprland.org/Hypr-Ecosystem/hyprpaper/║
# ╚══════════════════════════════════════════════════════════════╝

# ── Behaviour ──
# Disable IPC if you only ever set the wallpaper at startup. We leave
# it on so the rotation hook below (and any future tooling) can drive
# wallpaper changes without restarting the daemon.
ipc = on

# Splash text on the lock screen / startup. Off because we use hyprlock.
splash = false

# Smarter texture loading on machines with limited VRAM (Intel iGPU).
# Set to false if you ever see flicker at boot.
preload_dimmed = false

# ── Preload the wallpaper(s) ──
# Each `preload` decodes the file into memory. One entry per file.
# Keep this list short on a memory-constrained machine: each 4K image
# is roughly 33MB of uncompressed buffer.
preload = ~/Pictures/Wallpapers/wallpaper.png

# ── Assign wallpapers to monitors ──
# Format:  wallpaper = <monitor>, <preloaded path>
# An empty <monitor> string means "all monitors". Replace with a name
# like HDMI-A-1 or DP-1 if you want different wallpapers per output.
wallpaper = , ~/Pictures/Wallpapers/wallpaper.png

# ╔══════════════════════════════════════════════════════════════╗
# ║  Future hook: time-aware Wheatstacks rotation                 ║
# ║                                                              ║
# ║  The eventual plan is to rotate through Monet's Wheatstacks   ║
# ║  series so the painting on screen matches the current time   ║
# ║  of day and time of year. Morning gets a morning painting;   ║
# ║  winter midday gets a snow scene; autumn dusk gets the       ║
# ║  golden one, and so on.                                      ║
# ║                                                              ║
# ║  Full spec, including the painting-to-time mapping, the      ║
# ║  selector script, the systemd user timer, and notes on       ║
# ║  sourcing the source paintings, lives at:                    ║
# ║                                                              ║
# ║     ideas/wheatstacks-rotation.md                            ║
# ║                                                              ║
# ║  Nothing in this config has to change to support it. When    ║
# ║  the rotation is implemented, it drives this daemon via      ║
# ║  `hyprctl hyprpaper preload` + `wallpaper` from the outside. ║
# ╚══════════════════════════════════════════════════════════════╝
