# ╔══════════════════════════════════════════════════════════════╗
# ║  KITTY TERMINAL CONFIG                                      ║
# ║                                                              ║
# ║  Kitty is GPU-accelerated and feature-rich. This config      ║
# ║  keeps things clean but sets up the Wheatstacks palette.     ║
# ║                                                              ║
# ║  Reload config: Ctrl+Shift+F5                                ║
# ║  Full docs: https://sw.kovidgoyal.net/kitty/conf/            ║
# ╚══════════════════════════════════════════════════════════════╝

# --- Font ---
# JetBrains Mono is the most common nerd font for terminal use.
# Install: ttf-jetbrains-mono-nerd (on Arch)
font_family      JetBrains Mono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        12.0

# --- Cursor ---
cursor_shape beam
cursor_beam_thickness 1.5

# --- Window ---
# macOS Terminal feels nearly opaque with just a hint of depth. We tune
# kitty to match: 0.96 opacity, slightly reduced padding for a tighter
# look, and no close-confirmation prompt because we trust ourselves.
window_padding_width 8
background_opacity 0.96
confirm_os_window_close 0
hide_window_decorations yes

# --- Scrollback ---
scrollback_lines 10000

# --- Bell ---
enable_audio_bell no
visual_bell_duration 0

# --- Tab bar ---
# Kitty can show tabs. "powerline" style looks good with a rice.
tab_bar_style powerline
tab_powerline_style slanted

# --- Shell ---
shell fish

# ──────────────────────────────────────────────
# WHEATSTACKS COLOR SCHEME
# ──────────────────────────────────────────────
# To swap your palette, just replace the hex values below.
# The variable names explain what each color is for.

# Base colors
foreground #d4c4b0
background #1a1520
selection_foreground #1a1520
selection_background #d4c4b0
cursor     #b07050
cursor_text_color #1a1520

# Tab bar colors
active_tab_foreground   #1a1520
active_tab_background   #b07050
inactive_tab_foreground #a09890
inactive_tab_background #252030
tab_bar_background      #1a1520

# Window border colors (for kitty splits, not WM borders)
active_border_color   #b07050
inactive_border_color #302a3a

# The 16 terminal colors.
# These map to color codes 0-15 that terminal apps use.
#
# Normal (dark) variants:
color0  #1a1520    # black   (background)
color1  #c06060    # red     (errors)
color2  #80a078    # green   (success, git additions)
color3  #c4a060    # yellow  (warnings, strings)
color4  #8090a8    # blue    (info, keywords)
color5  #9088a0    # magenta (types, special)
color6  #708070    # cyan    (constants)
color7  #d4c4b0    # white   (foreground)

# Bright variants (used for bold text, highlights):
color8  #302a3a    # bright black  (comments, subtle text)
color9  #d08070    # bright red
color10 #98b890    # bright green
color11 #d4b878    # bright yellow
color12 #a0a8b0    # bright blue
color13 #a898b0    # bright magenta
color14 #88a090    # bright cyan
color15 #e8ddd0    # bright white  (bright foreground)
